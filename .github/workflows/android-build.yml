name: Build Android App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-build.yml'

permissions:
  contents: write

jobs:
  build:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read app version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Build Android Release Bundle (AAB)
        working-directory: ./android
        run: ./gradlew bundleRelease

      - name: Build Android Release APK (APK)
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Build Android Debug APK (for distribution)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Prepare APK for GitHub Release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk werkit.apk

      - name: Remove previous android-latest release
        run: |
          gh release delete android-latest -y 2>/dev/null || true
          git push origin :refs/tags/android-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish APK to GitHub Release (android-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Werkit Android (najnowszy build)
          body: |
            Automatyczny build z gałęzi `main`.
            **Jeden plik APK dla wszystkich organizacji** — logowanie wybiera firmę w aplikacji.
            Wersja z package.json: ${{ steps.pkg.outputs.version }}
          files: werkit.apk
          make_latest: false

      - name: Upload Release Bundle (AAB)
        uses: actions/upload-artifact@v7
        with:
          name: werkit-app-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: werkit-app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Debug APK (Test)
        uses: actions/upload-artifact@v7
        with:
          name: werkit-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
